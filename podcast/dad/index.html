<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f5f5f7" />
    <title>Dad's Podcast</title>
    <meta name="description" content="A podcast from Two Smiles Media." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <p class="eyebrow">Podcast · playlist</p>
        <h1>Dad's Podcasts</h1>
      </header>

      <div class="home-screen-hint" id="home-screen-hint" hidden>
        <span>▎ Tap the Share button ( ⬆ ) then choose "Add to Home Screen"</span>
        <button class="hsb-close" aria-label="Dismiss">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
          </svg>
        </button>
      </div>

      <div class="card">
        <div class="player-block">
          <audio id="player" preload="metadata"></audio>

          <div class="custom-player">
            <div class="cp-track">
              <span class="cp-now-label">Now playing</span>
              <span id="cp-title" class="cp-title">—</span>
            </div>
            <div class="cp-progress-row">
              <span id="cp-time" class="cp-time">0:00</span>
              <input
                id="cp-seek"
                class="cp-seek"
                type="range"
                min="0"
                max="100"
                value="0"
                step="0.1"
                aria-label="Seek through episode"
              />
              <span id="cp-dur" class="cp-dur">0:00</span>
            </div>
            <div
              class="cp-controls"
              role="group"
              aria-label="Playback controls"
            >
              <button
                id="btn-prev"
                class="cp-btn"
                aria-label="Previous episode"
              >
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <rect x="5" y="5" width="2.5" height="14" rx="1.25" />
                  <path d="M18.5 5 9 12l9.5 7V5z" />
                </svg>
              </button>
              <button
                id="btn-play"
                class="cp-btn cp-btn--play"
                aria-label="Play"
              >
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M8 5v14l11-7z" />
                </svg>
              </button>
              <button id="btn-next" class="cp-btn" aria-label="Next episode">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M5.5 5l9.5 7-9.5 7V5z" />
                  <rect x="16.5" y="5" width="2.5" height="14" rx="1.25" />
                </svg>
              </button>
            </div>
            <div class="cp-rate" role="group" aria-label="Playback speed">
              <span class="cp-rate-label">Speed</span>
              <div class="cp-rate-btns">
                <button
                  type="button"
                  class="cp-rate-btn"
                  data-rate="1"
                  aria-pressed="false"
                >
                  1×
                </button>
                <button
                  type="button"
                  class="cp-rate-btn"
                  data-rate="1.25"
                  aria-pressed="false"
                >
                  1.25×
                </button>
                <button
                  type="button"
                  class="cp-rate-btn"
                  data-rate="1.5"
                  aria-pressed="false"
                >
                  1.5×
                </button>
                <button
                  type="button"
                  class="cp-rate-btn"
                  data-rate="2"
                  aria-pressed="false"
                >
                  2×
                </button>
              </div>
            </div>
          </div>
        </div>

        <p class="playlist-title">Episodes</p>
        <ul class="playlist" id="playlist" role="list"></ul>
      </div>
    </div>

    <script>
      const SHOW_ARTIST = "Two Smiles Media";
      const SHOW_ALBUM = "Two Smiles";

      const episodes = [
        {
          title: "Welland Hijink",
          note: "Fiction — Dale and Glen, 1955 Welland; canal, Stokes/General Tire (~26 min, ElevenLabs TTS @ 0.9)",
          src: "https://twosmiles-podcasts.s3.amazonaws.com/dad/welland-hijink.mp3",
          published: "2026-04-26",
        },
        {
          title: "Ironwood, Hurley, and the Lake Superior imagination",
          note: "Gogebic and Mesabi, borders, open-pit and shaft mining, Hurley and Prohibition—full episode (~57 min)",
          src: "https://twosmiles-podcasts.s3.amazonaws.com/dad/ironwood-gogebic-mesabi-50s.mp3",
          published: "2026-04-21",
        },
        {
          title: "Social housing — when CMHC stepped back",
          note: "Federal build-up, the 1990s turn, provincial administration, and Dale Falkenhagen’s CMHC history of RRAP",
          src: "https://twosmiles-podcasts.s3.amazonaws.com/dad/social-housing-cmhc-provinces.mp3",
          published: "2026-04-20",
        },
        {
          title: "Falkenhagen — place, name, bunker, science",
          note: "From Brandenburg villages and palace lithographs to N-stoff, Warsaw Pact C2, and the Debye–Falkenhagen effect",
          src: "https://twosmiles-podcasts.s3.amazonaws.com/dad/falkenhagen.mp3",
          published: "2026-04-19",
        },
        {
          title: "Barney Danson — soldier, minister, memory-keeper",
          note: "A biographical walk through Toronto, Normandy, Trudeau-era Defence, Katimavik, and the War Museum",
          src: "https://twosmiles-podcasts.s3.amazonaws.com/dad/barney-danson.mp3",
          published: "2026-04-19",
        },
        {
          title: "Welland in the Fifties",
          note: "Steel, the canal, and life in a 1950s Ontario factory town",
          src: "https://twosmiles-podcasts.s3.amazonaws.com/dad/welland-1.mp3",
          published: "2026-04-12",
        },
        {
          title: "Canada, the Moon & Artemis II",
          note: "A conversation about Canada's role in the next lunar mission",
          src: "https://twosmiles-podcasts.s3.amazonaws.com/dad/moon.mp3",
          published: "2026-04-06",
        },
        {
          title: "The foundation in the late sixties",
          note: "Ontario’s Addiction Research Foundation—1965–1970 records and archives",
          src: "https://twosmiles-podcasts.s3.amazonaws.com/dad/foundation-1965-1970.mp3",
          published: "2026-04-12",
        },
      ];

      const player = document.getElementById("player");
      const playlistEl = document.getElementById("playlist");
      const cpTitle = document.getElementById("cp-title");
      const cpTime = document.getElementById("cp-time");
      const cpDur = document.getElementById("cp-dur");
      const cpSeek = document.getElementById("cp-seek");
      const btnPlay = document.getElementById("btn-play");
      const btnPrev = document.getElementById("btn-prev");
      const btnNext = document.getElementById("btn-next");

      const RATE_OPTIONS = [1, 1.25, 1.5, 2];
      const RATE_STORAGE_KEY = "pod-playback-rate";

      function nearestRate(playbackRate) {
        if (!Number.isFinite(playbackRate)) return 1;
        return RATE_OPTIONS.reduce(
          (best, x) =>
            Math.abs(x - playbackRate) < Math.abs(best - playbackRate)
              ? x
              : best,
          RATE_OPTIONS[0],
        );
      }

      function readStoredPlaybackRate() {
        try {
          const raw = localStorage.getItem(RATE_STORAGE_KEY);
          if (raw == null) return 1;
          const v = Number(raw);
          if (!Number.isFinite(v)) return 1;
          return nearestRate(v);
        } catch (_) {
          return 1;
        }
      }

      function syncPlaybackRateButtons() {
        const r = nearestRate(player.playbackRate);
        document.querySelectorAll(".cp-rate-btn").forEach((btn) => {
          const x = Number(btn.dataset.rate);
          const active = Math.abs(x - r) < 0.001;
          btn.classList.toggle("cp-rate-btn--active", active);
          btn.setAttribute("aria-pressed", active ? "true" : "false");
        });
      }

      function setPlaybackRate(rate) {
        const r = nearestRate(Number(rate));
        player.playbackRate = r;
        try {
          localStorage.setItem(RATE_STORAGE_KEY, String(r));
        } catch (_) {}
        syncPlaybackRateButtons();
        updatePositionState();
      }

      document.querySelectorAll(".cp-rate-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          setPlaybackRate(btn.dataset.rate);
        });
      });

      let current = 0;
      let positionSyncScheduled = false;
      let isSeeking = false;
      let autoAdvanceTimeoutId = null;

      const AUTO_ADVANCE_GAP_MS = 2000;

      function clearPendingAutoAdvance() {
        if (autoAdvanceTimeoutId !== null) {
          clearTimeout(autoAdvanceTimeoutId);
          autoAdvanceTimeoutId = null;
        }
      }

      const PLAY_SVG = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>`;
      const PAUSE_SVG = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="4" width="4" height="16" rx="1.5"/><rect x="14" y="4" width="4" height="16" rx="1.5"/></svg>`;

      // ── Helpers ──────────────────────────────────────────────────────────

      function supportsMediaSession() {
        return "mediaSession" in navigator;
      }

      function fmtTime(s) {
        if (!Number.isFinite(s) || s < 0) return "0:00";
        const m = Math.floor(s / 60);
        const sec = String(Math.floor(s % 60)).padStart(2, "0");
        return `${m}:${sec}`;
      }

      /** `published` is ISO date-only, e.g. "2026-04-12". */
      function fmtPublished(iso) {
        const d = new Date(`${iso}T12:00:00`);
        if (Number.isNaN(d.getTime())) return iso;
        return d.toLocaleDateString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
        });
      }

      /** Load duration for playlist row (separate from main player). */
      function primeEpisodeDuration(src, durEl) {
        durEl.classList.add("ep-dur--pending");
        durEl.textContent = "—";
        const a = new Audio();
        a.preload = "metadata";
        const cleanup = () => {
          a.removeEventListener("loadedmetadata", onMeta);
          a.removeEventListener("error", onErr);
          a.removeAttribute("src");
          try {
            a.load();
          } catch (_) {}
        };
        const onMeta = () => {
          if (!durEl.isConnected) {
            cleanup();
            return;
          }
          durEl.classList.remove("ep-dur--pending");
          if (Number.isFinite(a.duration) && a.duration > 0) {
            const formatted = fmtTime(a.duration);
            durEl.textContent = formatted;
            durEl.setAttribute("aria-label", `Duration ${formatted}`);
          } else {
            durEl.textContent = "—";
          }
          cleanup();
        };
        const onErr = () => {
          if (durEl.isConnected) {
            durEl.classList.remove("ep-dur--pending");
            durEl.textContent = "—";
          }
          cleanup();
        };
        a.addEventListener("loadedmetadata", onMeta);
        a.addEventListener("error", onErr);
        a.src = src;
      }

      // ── Custom-player UI updates ──────────────────────────────────────────

      function updatePlayBtn() {
        const paused = player.paused;
        btnPlay.innerHTML = paused ? PLAY_SVG : PAUSE_SVG;
        btnPlay.setAttribute("aria-label", paused ? "Play" : "Pause");
      }

      function updateCpTitle() {
        cpTitle.textContent = episodes[current].title;
      }

      function updateSeekFill() {
        const max = Number(cpSeek.max);
        const val = Number(cpSeek.value);
        const pct = max > 0 ? (val / max) * 100 : 0;
        cpSeek.style.setProperty("--fill", `${pct.toFixed(2)}%`);
      }

      function updateSeek() {
        const dur = player.duration;
        if (Number.isFinite(dur) && dur > 0) {
          cpSeek.max = String(dur);
          if (!isSeeking) cpSeek.value = String(player.currentTime);
          cpDur.textContent = fmtTime(dur);
        }
        cpTime.textContent = fmtTime(player.currentTime);
        updateSeekFill();
      }

      function updateTrackButtons() {
        const multi = episodes.length > 1;
        btnPrev.disabled = !multi;
        btnNext.disabled = !multi;
      }

      // ── Media Session ─────────────────────────────────────────────────────

      function updateMediaMetadata() {
        if (!supportsMediaSession()) return;
        const ep = episodes[current];
        try {
          navigator.mediaSession.metadata = new MediaMetadata({
            title: ep.title,
            artist: SHOW_ARTIST,
            album: SHOW_ALBUM,
          });
        } catch (_) {}
      }

      function updatePositionState() {
        if (
          !supportsMediaSession() ||
          typeof navigator.mediaSession.setPositionState !== "function"
        )
          return;
        if (!Number.isFinite(player.duration) || player.duration <= 0) {
          try {
            navigator.mediaSession.setPositionState(null);
          } catch (_) {}
          return;
        }
        const position = Math.min(
          Math.max(player.currentTime, 0),
          player.duration,
        );
        try {
          navigator.mediaSession.setPositionState({
            duration: player.duration,
            playbackRate: player.playbackRate,
            position,
          });
        } catch (_) {}
      }

      function schedulePositionSync() {
        if (positionSyncScheduled) return;
        positionSyncScheduled = true;
        requestAnimationFrame(() => {
          positionSyncScheduled = false;
          updatePositionState();
        });
      }

      function syncPlaybackState() {
        if (!supportsMediaSession()) return;
        navigator.mediaSession.playbackState = player.paused
          ? "paused"
          : "playing";
      }

      function registerMediaSessionHandlers() {
        if (!supportsMediaSession()) return;
        try {
          navigator.mediaSession.setActionHandler("play", () => player.play());
          navigator.mediaSession.setActionHandler("pause", () =>
            player.pause(),
          );
          navigator.mediaSession.setActionHandler("seekbackward", (d) => {
            const skip = d.seekOffset ?? 10;
            player.currentTime = Math.max(0, player.currentTime - skip);
            schedulePositionSync();
          });
          navigator.mediaSession.setActionHandler("seekforward", (d) => {
            const skip = d.seekOffset ?? 10;
            const end = Number.isFinite(player.duration)
              ? player.duration
              : player.currentTime + skip;
            player.currentTime = Math.min(end, player.currentTime + skip);
            schedulePositionSync();
          });
        } catch (_) {}

        if (episodes.length > 1) {
          try {
            navigator.mediaSession.setActionHandler("previoustrack", () => {
              loadEpisode(
                (current - 1 + episodes.length) % episodes.length,
                true,
              );
            });
            navigator.mediaSession.setActionHandler("nexttrack", () => {
              loadEpisode((current + 1) % episodes.length, true);
            });
          } catch (_) {}
        }
      }

      // ── Episode loading ───────────────────────────────────────────────────

      function loadEpisode(index, autoplay) {
        clearPendingAutoAdvance();
        current = index;
        player.src = episodes[current].src;
        updateCpTitle();
        renderPlaylist();
        updateMediaMetadata();
        updateSeek();
        if (autoplay) player.play().catch(() => {});
      }

      // ── Player events ─────────────────────────────────────────────────────

      player.addEventListener("play", () => {
        clearPendingAutoAdvance();
        updatePlayBtn();
        syncPlaybackState();
        updateMediaMetadata();
      });
      player.addEventListener("pause", () => {
        updatePlayBtn();
        syncPlaybackState();
      });
      player.addEventListener("loadedmetadata", () => {
        updateMediaMetadata();
        updatePositionState();
        updateSeek();
      });
      player.addEventListener("durationchange", () => {
        updatePositionState();
        updateSeek();
      });
      player.addEventListener("ratechange", () => {
        syncPlaybackRateButtons();
        updatePositionState();
      });
      player.addEventListener("seeked", () => {
        updatePositionState();
        updateSeek();
      });
      player.addEventListener("timeupdate", () => {
        schedulePositionSync();
        if (!isSeeking) updateSeek();
      });
      player.addEventListener("ended", () => {
        if (episodes.length > 1) {
          clearPendingAutoAdvance();
          autoAdvanceTimeoutId = setTimeout(() => {
            autoAdvanceTimeoutId = null;
            loadEpisode((current + 1) % episodes.length, true);
          }, AUTO_ADVANCE_GAP_MS);
          return;
        }
        if (supportsMediaSession())
          navigator.mediaSession.playbackState = "paused";
        updatePlayBtn();
      });

      // ── Button interactions ───────────────────────────────────────────────

      btnPlay.addEventListener("click", () => {
        if (player.paused) player.play().catch(() => {});
        else player.pause();
      });
      btnPrev.addEventListener("click", () => {
        loadEpisode((current - 1 + episodes.length) % episodes.length, true);
      });
      btnNext.addEventListener("click", () => {
        loadEpisode((current + 1) % episodes.length, true);
      });

      // ── Seek bar ──────────────────────────────────────────────────────────

      cpSeek.addEventListener("mousedown", () => {
        isSeeking = true;
      });
      cpSeek.addEventListener(
        "touchstart",
        () => {
          isSeeking = true;
        },
        { passive: true },
      );
      cpSeek.addEventListener("input", () => {
        cpTime.textContent = fmtTime(Number(cpSeek.value));
        updateSeekFill();
      });
      cpSeek.addEventListener("change", () => {
        player.currentTime = Number(cpSeek.value);
        isSeeking = false;
      });

      // ── Playlist rendering ────────────────────────────────────────────────

      function renderPlaylist() {
        playlistEl.innerHTML = "";
        episodes.forEach((ep, i) => {
          const li = document.createElement("li");
          li.setAttribute("role", "listitem");
          li.tabIndex = 0;
          if (i === current) li.setAttribute("aria-current", "true");

          const num = document.createElement("span");
          num.className = "ep-num";
          num.textContent = String(i + 1).padStart(2, "0");

          const meta = document.createElement("div");
          meta.className = "ep-meta";
          const titleRow = document.createElement("div");
          titleRow.className = "ep-title-row";
          const t = document.createElement("div");
          t.className = "ep-title";
          t.textContent = ep.title;
          const durEl = document.createElement("span");
          durEl.className = "ep-dur";
          durEl.setAttribute("aria-label", "Duration loading");
          titleRow.append(t, durEl);
          primeEpisodeDuration(ep.src, durEl);
          const s = document.createElement("div");
          s.className = "ep-sub";
          s.textContent = ep.note;
          meta.append(titleRow, s);
          if (ep.published) {
            const dEl = document.createElement("div");
            dEl.className = "ep-date";
            dEl.setAttribute(
              "aria-label",
              `Published ${fmtPublished(ep.published)}`,
            );
            dEl.textContent = fmtPublished(ep.published);
            meta.appendChild(dEl);
          }

          const badge = document.createElement("span");
          badge.className = "now";
          badge.textContent = "Playing";

          li.append(num, meta, badge);

          const play = () => loadEpisode(i, true);
          li.addEventListener("click", play);
          li.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              play();
            }
          });

          playlistEl.appendChild(li);
        });
      }

      // ── Init ──────────────────────────────────────────────────────────────

      registerMediaSessionHandlers();
      updateTrackButtons();
      renderPlaylist();
      loadEpisode(0, false);
      updatePlayBtn();
      setPlaybackRate(readStoredPlaybackRate());

      // ── iOS audio session (keep playing on lock screen) ─────────────────
      if ("audioSession" in navigator) {
        try { navigator.audioSession.type = "playback"; } catch (_) {}
      }

      // ── Home-screen hint ────────────────────────────────────────────────
      (function () {
        const isStandalone =
          window.navigator.standalone === true ||
          window.matchMedia("(display-mode: standalone)").matches;
        const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
        const dismissed = localStorage.getItem("hsb-dismissed");
        if (isStandalone || !isIOS || dismissed) return;
        const hint = document.getElementById("home-screen-hint");
        if (!hint) return;
        hint.hidden = false;
        hint.querySelector(".hsb-close").addEventListener("click", () => {
          hint.hidden = true;
          try { localStorage.setItem("hsb-dismissed", "1"); } catch (_) {}
        });
      })();
    </script>
  </body>
</html>
